services:
  double-scramble:
    image: ghcr.io/OWNER/double-scramble-live:latest   # or: build: .
    restart: unless-stopped                            # 24/7
    environment:
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY:-}
      TZ: America/Chicago   # clock overlay shows container-local time
      # DEMO: "1"            # uncomment to run without an SDR
      # WIDTH: "1920"
      # HEIGHT: "1080"
      # VIDEO_BITRATE: "4500k"
    volumes:
      - /var/run/dump1090-mutability:/adsb:ro
      - ./output:/output      # local HLS preview when no stream key is set
